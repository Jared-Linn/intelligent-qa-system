model:
  name: "Qwen/Qwen2.5-3B-Instruct"
  cache_dir: "/root/autodl-tmp/models/qwen_cache/"

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"

data:
  train_path: "data/raw/faq_expanded.json"
  val_split: 0.1
  max_length: 512

training:
  output_dir: "/root/autodl-tmp/checkpoints/qwen_lora/"
  num_epochs: 50
  batch_size: 4
  gradient_accumulation_steps: 8
  learning_rate: 2e-4
  warmup_ratio: 0.1
  weight_decay: 0.01
  logging_steps: 5
  save_steps: 0
  save_strategy: "epoch"
  save_total_limit: 3
  eval_strategy: "epoch"
  eval_steps: 0
  fp16: true
  bf16: false
  gradient_checkpointing: true
  max_grad_norm: 1.0
  report_to: "tensorboard"
  run_name: "qwen_lora_faq"
  logging_dir: "/root/autodl-tmp/logs/qwen_lora/"
