<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能问答系统</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-inner">
            <a href="#/" class="nav-brand">🤖 智能问答</a>
            <div class="nav-links">
                <a href="#/qa">问答</a>
                <a href="#/ranking">排行榜</a>
                <a href="#/dashboard" class="auth-only" style="display:none">控制台</a>
                <a href="#/login" class="guest-only">登录</a>
                <a href="#/register" class="guest-only">注册</a>
                <span class="auth-only" style="display:none">
                    <span id="userInfo" class="nav-user"></span>
                    <a href="#" onclick="Auth.logout(); return false;">退出</a>
                </span>
            </div>
        </div>
    </nav>

    <main id="app" class="container">
        <div class="loading"><div class="spinner"></div> 加载中...</div>
    </main>

    <footer class="footer">
        <p>智能问答系统 · 检索式 + 生成式 · <a href="https://github.com/Jared-Linn/intelligent-qa-system" target="_blank">GitHub</a></p>
    </footer>

    <script src="/static/js/api.js"></script>
    <script src="/static/js/auth.js"></script>
    <script src="/static/js/router.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            Auth._updateUI();
            Router.start();
        });
    </script>
</body>
</html>
