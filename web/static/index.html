<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能问答系统</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-inner">
            <a href="#/" class="nav-brand">🤖 智能问答</a>
            <div class="nav-links">
                <a href="#/qa">问答</a>
                <a href="#/ranking">排行榜</a>
                <a href="#/dashboard" class="auth-only" style="display:none">控制台</a>
                <a href="#/login" class="guest-only">登录</a>
                <a href="#/register" class="guest-only">注册</a>
                <span class="auth-only" style="display:none">
                    <span id="userInfo" class="nav-user"></span>
                    <a href="#" onclick="Auth.logout(); return false;">退出</a>
                </span>
            </div>
        </div>
    </nav>

    <main id="app" class="container">
        <div class="loading"><div class="spinner"></div> 加载中...</div>
    </main>

    <footer class="footer">
        <p>智能问答系统 · 检索式 + 生成式 · <a href="https://github.com/Jared-Linn/intelligent-qa-system" target="_blank">GitHub</a></p>
    </footer>

    <script src="/static/js/api.js"></script>
    <script src="/static/js/auth.js"></script>
    <script src="/static/js/router.js"></script>
    <script>
        // 全局 JS 错误捕获，显示在页面上方便调试
        window.onerror = function(msg, url, line, col, err) {
            const el = document.createElement('div');
            el.style.cssText = 'position:fixed;bottom:0;left:0;right:0;background:#c00;color:#fff;padding:8px;font-size:13px;z-index:9999';
            el.textContent = 'JS Error: ' + (err?.message || msg) + ' (line ' + line + ')';
            document.body.appendChild(el);
            console.error('GLOBAL ERROR:', msg, err);
        };
        window.addEventListener('unhandledrejection', function(e) {
            const el = document.createElement('div');
            el.style.cssText = 'position:fixed;bottom:40px;left:0;right:0;background:#e67e22;color:#fff;padding:8px;font-size:13px;z-index:9999';
            el.textContent = 'Promise Error: ' + (e.reason?.message || e.reason);
            document.body.appendChild(el);
            console.error('UNHANDLED PROMISE:', e.reason);
        });
    </script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            Auth._updateUI();
            Router.start();
        });
    </script>
</body>
</html>
